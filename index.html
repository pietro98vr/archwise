<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#007e86">
<link rel="icon" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<meta property="og:type" content="website">
<meta property="og:title" content="ArchWise — supporto decisionale full-arch">
<meta property="og:description" content="Questionario guidato per la scelta della protesi full-arch su impianti: opzione piu indicata, confronto tra sei soluzioni e resoconto PDF.">
<meta property="og:image" content="favicon.svg">
<meta name="twitter:card" content="summary">
<title>ArchWise · full-arch decision support</title>
<meta name="description" content="Guida decisionale per protesi full-arch avvitate su impianti: un questionario passo-passo, la riabilitazione più indicata e il confronto tra le sei opzioni.">
<style>
:root{
  --ink:#14282d; --muted:#5a6b6e; --faint:#8fa0a0;
  --brand:#007e86; --brand2:#00a6ae; --lime:#00a6ae; --lime-2:#7fd6d9; --lime-soft:#e2f2f2;
  --line:#e0eaea; --line2:#eef3f3; --bg:#f3f6f6; --bg2:#e6f0f0; --card:#fff; --card2:#f8fbfb;
  --gold:#c68a2e; --red:#bf4a30; --blue:#2c6f96; --violet:#8a5cc0;
  --sh1:0 1px 2px rgba(16,40,33,.05),0 3px 10px rgba(16,40,33,.05);
  --sh2:0 8px 30px rgba(16,40,33,.10); --sh3:0 20px 60px rgba(16,40,33,.18);
  --r:14px; --rl:22px; --rs:10px;
  --ff:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;--display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;overflow-x:clip}
body{margin:0;font-family:var(--ff);font-size:16px;line-height:1.55;color:var(--ink);
  background:var(--bg);
  min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{margin:0;font-family:var(--display);font-weight:600;line-height:1.2;letter-spacing:0}
a{color:var(--brand2);text-decoration:none}a:hover{text-decoration:underline}
p{margin:.4em 0}
.wrap{max-width:1180px;margin:0 auto;padding-left:max(clamp(18px,3vw,26px),env(safe-area-inset-left));padding-right:max(clamp(18px,3vw,26px),env(safe-area-inset-right))}
.hidden{display:none!important}

/* brand / header */
header.top{position:sticky;top:0;z-index:40;background:#f7fafa;border-bottom:1px solid var(--line)}
.top-in{display:flex;align-items:center;gap:14px;min-height:66px;padding:8px 0;position:relative}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.logo{width:44px;height:44px;border-radius:13px;flex:none;background:linear-gradient(140deg,var(--brand),var(--brand2) 60%,var(--lime));display:grid;place-items:center;box-shadow:0 4px 14px rgba(0,126,134,.32)}
.logo svg{width:30px;height:30px}
.brand .wm{min-width:0}
.brand .wm b{font-size:17px;font-weight:800;letter-spacing:-.03em;display:block;line-height:1}
.brand .wm b span{color:var(--brand)}
.brand .wm small{display:block;color:var(--muted);font-size:11px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav{display:flex;gap:3px;margin-left:auto;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{font:inherit;font-size:13.5px;font-weight:650;color:var(--muted);background:none;border:0;padding:9px 12px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:.15s}
.nav button:hover{background:var(--bg2);color:var(--ink)}
.nav button.on{background:var(--brand);color:#fff}
.lang{flex:none;display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.lang button{font:inherit;font-size:12px;font-weight:800;border:0;background:none;color:var(--muted);padding:8px 9px;cursor:pointer}
.lang button.on{background:#fff;color:var(--brand);box-shadow:var(--sh1)}
.menu-btn{display:none;flex:none;border:1px solid var(--line);background:#fff;border-radius:10px;width:42px;height:42px;cursor:pointer}

.view{display:none;animation:fade .3s ease}.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
section.pad{padding:14px 0 44px}
.eyebrow{display:inline-block;font-family:var(--ff);font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);border-top:2px solid var(--brand);padding:7px 0 0;background:none}

/* ---------- WIZARD ---------- */
.stage{max-width:660px;margin:0 auto;padding:20px 0 40px}
.intro{text-align:center;margin-bottom:18px}
.intro h1{font-size:clamp(23px,4vw,33px);margin:14px 0 8px}
.intro p{color:var(--muted);max-width:52ch;margin:0 auto;font-size:15.5px}
.prog{display:flex;align-items:center;gap:12px;margin:6px 0 14px}
.prog .track{flex:1;height:7px;border-radius:999px;background:var(--bg2);overflow:hidden}
.prog .track i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--lime),var(--brand));width:0;transition:width .45s cubic-bezier(.2,.8,.2,1)}
.prog .lbl{font-size:12.5px;font-weight:700;color:var(--muted);white-space:nowrap}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--rl);box-shadow:var(--sh2);padding:clamp(20px,4vw,32px);animation:slide .32s cubic-bezier(.2,.8,.2,1)}
@keyframes slide{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:none}}
.qcard .step-tag{font-size:11.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--lime);display:flex;align-items:center;gap:7px}
.qcard .step-tag .dot{width:7px;height:7px;border-radius:50%;background:var(--lime)}
.qcard h2{font-size:clamp(20px,3.2vw,26px);margin:10px 0 4px;letter-spacing:-.02em}
.qopts{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.qopt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;font:inherit;font-size:16px;font-weight:600;color:var(--ink);background:var(--card2);border:1.6px solid var(--line);border-radius:14px;padding:15px 16px;cursor:pointer;transition:.16s}
.qopt:hover{border-color:var(--lime-2);background:#fff;transform:translateY(-1px);box-shadow:var(--sh1)}
.qopt .rd{width:22px;height:22px;border-radius:50%;border:2px solid #c7d4d4;flex:none;display:grid;place-items:center;transition:.16s}
.qopt.sel{border-color:var(--brand);background:linear-gradient(180deg,#f2fbfb,#fff);box-shadow:var(--sh1)}
.qopt.sel .rd{border-color:var(--brand);background:var(--brand)}
.qopt.sel .rd::after{content:"";width:9px;height:9px;border-radius:50%;background:#fff}
.qopt .lab{flex:1}
.qnav{display:flex;align-items:center;gap:10px;margin-top:22px}
.why{margin-top:16px;border-top:1px dashed var(--line2);padding-top:12px}
.why>summary{list-style:none;cursor:pointer;font-size:13px;font-weight:700;color:var(--brand2);display:inline-flex;align-items:center;gap:7px}
.why>summary::-webkit-details-marker{display:none}
.why .whx{margin-top:10px;font-size:13.5px;color:#333f42;line-height:1.62}
.why .whx p{margin:.55em 0}
sup.reflink{cursor:pointer;color:var(--blue);background:#e9f1f7;border-radius:4px;padding:0 4px;font-size:9.5px;font-weight:800;margin:0 1px}
.whybib{margin-top:13px;padding-top:11px;border-top:1px solid var(--line2)}
.whybib-h{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--brand);margin-bottom:7px}
.whyref{font-size:11.5px;color:var(--muted);margin-bottom:6px;line-height:1.45}
.whyref b{color:var(--ink)}
.whyref a{font-weight:700}
.whyref .badge{vertical-align:middle}
.btn{font:inherit;font-weight:750;border:0;border-radius:12px;padding:12px 20px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.btn.primary{background:var(--brand);color:#fff;box-shadow:var(--sh1)}
.btn.primary:hover{filter:brightness(1.07);transform:translateY(-1px)}
.btn.ghost{background:#fff;border:1.6px solid var(--line);color:var(--ink)}
.btn.ghost:hover{border-color:var(--lime-2)}
.btn.sm{padding:9px 14px;font-size:14px}
.btn.block{width:100%}
.btn[disabled]{opacity:.4;cursor:not-allowed}

/* ---------- RESULTS ---------- */
.results{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:16px;padding-bottom:30px}
.rback{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rhero{position:relative;overflow:hidden;border-radius:var(--rl);padding:clamp(18px,3vw,26px);color:#fff;background:var(--brand);box-shadow:var(--sh1)}
.rhero::after{content:"";position:absolute;right:0;top:0;bottom:0;width:5px;background:var(--lime)}
.rhero .k{position:relative;font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;opacity:.92}
.rhero h2{position:relative;font-size:clamp(21px,3.4vw,29px);margin:6px 0 10px}
.rhero .compo{position:relative;display:flex;flex-wrap:wrap;gap:7px}
.tagw{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);padding:6px 11px;border-radius:999px;font-size:12px;font-weight:600}
.tagw b{font-weight:800}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--rl);box-shadow:var(--sh1)}
.card.pad{padding:clamp(15px,2.4vw,22px)}
.ch{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ch .n{display:none}
.ch h3{font-size:15.5px}
.ch .sub{font-size:12px;color:var(--faint);margin-left:auto}
.rank{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.rk{border:1px solid var(--line);border-radius:var(--r);background:var(--card);padding:12px 14px;cursor:pointer;transition:.18s}
.rk:hover{box-shadow:var(--sh1)}
.rk.top{border-color:var(--lime-2);background:linear-gradient(180deg,#fafdfb,#fff)}
.rk-top{display:flex;align-items:center;gap:11px}
.rk .pos{width:28px;height:28px;flex:none;border-radius:8px;background:var(--bg2);color:var(--muted);font-weight:800;display:grid;place-items:center;font-size:13px}
.rk.top .pos{background:linear-gradient(135deg,var(--lime),var(--lime-2));color:#fff}
.rk .nm{font-weight:750;font-size:14.5px;min-width:0}
.rk .nm small{display:block;font-weight:500;color:var(--faint);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk .sc{margin-left:auto;text-align:right;flex:none}
.rk .sc b{font-size:19px;font-weight:800}.rk .sc span{font-size:10.5px;color:var(--faint)}
.bar{height:7px;border-radius:999px;background:var(--bg2);overflow:hidden;margin-top:10px}
.bar i{display:block;height:100%;border-radius:999px;width:0;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.rk .whyx{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line2);display:none}
.rk.open .whyx{display:block;animation:fade .25s}
.contrib{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-bottom:5px}
.contrib .d{flex:none;font-weight:800;width:34px;text-align:center;padding:2px 0;border-radius:6px;font-size:11px}
.contrib .d.pos{background:var(--lime-soft);color:#0a6b72}.contrib .d.neg{background:#fbe6df;color:#a23a22}
.contrib .tx{color:var(--muted)}
.reflink{font-size:10px;font-weight:800;color:var(--blue);background:#e9f1f7;border-radius:5px;padding:1px 5px;margin-left:2px;cursor:pointer}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{font-size:11.5px;padding:3px 9px;border-radius:999px;background:var(--bg2);color:var(--muted);border:1px solid var(--line)}
.chip.good{background:var(--lime-soft);color:#0a6b72;border-color:#cfe9e6}
.chip.warn{background:#fbe6df;color:#a23a22;border-color:#f0cabb}
.note{font-size:12.5px;color:var(--muted);background:var(--card2);border:1px dashed var(--line);border-radius:12px;padding:11px 13px}
.answers{display:flex;flex-wrap:wrap;gap:6px}
.ansch{font-size:11.5px;padding:5px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--muted);cursor:pointer}
.ansch b{color:var(--ink);font-weight:700}
.ansch:hover{border-color:var(--lime-2)}
.namegrid{display:grid;grid-template-columns:auto 1fr;gap:8px;margin-top:4px}
.inp{font:inherit;padding:11px;border:1.5px solid var(--line);border-radius:11px;background:#fff;min-width:0}
.inp:focus{outline:none;border-color:var(--brand2)}

/* map */
.mapwrap{overflow:hidden;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(0deg,transparent 23px,var(--line2) 24px),linear-gradient(90deg,transparent 23px,var(--line2) 24px);background-size:24px 24px;background-color:#fafdfd}
.mapwrap svg{display:block;width:100%;height:auto;max-width:100%}
.mapcard{overflow:visible}
@media(min-width:1024px){.results .mapcard{width:min(94vw,1360px);margin-left:50%;transform:translateX(-50%)}}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:9px;font-size:11.5px;color:var(--muted)}
.legend i{display:inline-block;width:20px;height:0;border-top:3px solid var(--lime);vertical-align:middle;margin-right:5px}
.legend i.dash{border-top-style:dashed;border-color:var(--gold)}.legend i.dim{border-color:#c7d4d4}

/* catalogue / refs / credits / legal */
.grid2{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:680px){.grid2{grid-template-columns:1fr 1fr}}
.optcard{border:1px solid var(--line);border-radius:var(--r);background:var(--card);padding:15px;box-shadow:var(--sh1)}
.optcard h4{font-size:15px;display:flex;align-items:center;gap:8px}
.swatch{width:13px;height:13px;border-radius:4px;flex:none}
.layers{font-size:12.5px;color:var(--muted);margin:8px 0}.layers b{color:var(--ink)}
.refhead{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0}
.reffilter{font:inherit;font-size:12.5px;font-weight:700;border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:6px 12px;cursor:pointer}
.reffilter.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.reflist{display:flex;flex-direction:column;gap:9px}
.ref{display:flex;gap:12px;padding:13px 15px;border:1px solid var(--line);border-radius:var(--r);background:var(--card);box-shadow:var(--sh1)}
.ref .num{flex:none;width:28px;height:28px;border-radius:8px;background:var(--lime-soft);color:var(--brand);font-weight:800;display:grid;place-items:center;font-size:12.5px}
.ref .t{font-weight:600;font-size:13.5px}.ref .j{font-size:12px;color:var(--muted);margin-top:3px}.ref .j em{color:var(--brand2);font-style:normal;font-weight:600}
.ref .tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px}.ref .doi{font-size:11.5px;font-weight:700}
.badge{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:5px;background:var(--bg2);color:var(--muted)}
.badge.q1{background:#e2f2f2;color:#0a8a86}.badge.grp{background:#eef0fb;color:#4854b3}
.credits{display:grid;grid-template-columns:1fr;gap:14px}@media(min-width:720px){.credits{grid-template-columns:repeat(3,1fr)}}
.person{text-align:center;padding:24px 18px;border:1px solid var(--line);border-radius:var(--rl);background:linear-gradient(180deg,var(--card),var(--card2));box-shadow:var(--sh1)}
.avatar{width:76px;height:76px;border-radius:50%;margin:0 auto 12px;overflow:hidden;box-shadow:var(--sh2)}.avatar svg{width:100%;height:100%;display:block}
.person h3{font-size:17px}.person .role{margin-top:4px;font-size:11.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--brand2)}.person .desc{margin-top:9px;font-size:12.5px;color:var(--muted)}
.prose{font-size:14px;line-height:1.65;color:#2b3d40}.prose p{margin:.6em 0}.prose h4{margin:16px 0 4px;font-size:14.5px}

/* modal gate */
.gate{position:fixed;inset:0;z-index:80;background:rgba(18,32,25,.55);backdrop-filter:blur(4px);display:grid;place-items:center;padding:16px;animation:fade .25s}
.gate .box{background:#fff;border-radius:var(--rl);max-width:520px;width:100%;box-shadow:var(--sh3);overflow:hidden;max-height:92vh;display:flex;flex-direction:column}
.gate .top-b{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:20px 22px;display:flex;align-items:center;gap:12px}
.gate .top-b .logo{box-shadow:none}
.gate .bd{padding:20px 22px;overflow:auto;font-size:13.5px;line-height:1.6;color:#2b3d40}
.gate .bd h4{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--brand);margin:12px 0 3px}
.gate .ft{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.tip{position:fixed;z-index:60;max-width:280px;background:#14282d;color:#fff;font-size:12.5px;line-height:1.45;padding:10px 12px;border-radius:10px;box-shadow:var(--sh3);pointer-events:none;opacity:0;transform:translateY(4px);transition:.15s}
.tip.on{opacity:1;transform:none}.tip b{color:var(--lime-2)}
.footer{border-top:1px solid var(--line);margin-top:20px;padding:18px 0 40px;font-size:12px;color:var(--faint);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.footer a{color:var(--muted)}

@media(max-width:720px){
  .menu-btn{display:grid;place-items:center}
  .nav{display:none}
  .nav.open{display:flex;position:absolute;top:60px;left:8px;right:8px;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px;gap:2px;box-shadow:var(--sh2);z-index:45}
  .nav.open button{text-align:left}
}

/* ---------- scroll questionnaire (reveal on scroll) ---------- */
.scroll-prog{position:sticky;top:74px;z-index:25;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.72);backdrop-filter:blur(8px);padding:9px 14px;border-radius:999px;border:1px solid var(--line);box-shadow:var(--sh1);max-width:640px;margin:6px auto 0}
.scroll-prog .track{flex:1;height:7px;border-radius:999px;background:var(--bg2);overflow:hidden}
.scroll-prog .track i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--lime),var(--brand));width:4%;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.scroll-prog .lbl{font-size:12.5px;font-weight:700;color:var(--muted);white-space:nowrap}
.qblock{max-width:648px;margin:0 auto;padding:14px 4px}
.qblock.qform{padding:14px 4px 26px}
.intro-block{text-align:center;min-height:calc(100vh - 160px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px}
.archero{width:min(342px,72vw);margin:0 auto 2px}
.intro-block .howmini{display:flex;flex-direction:column;gap:9px;max-width:430px;margin:20px auto 0;text-align:left}
.howmini .s{display:flex;gap:11px;align-items:flex-start;font-size:13.5px;color:var(--muted)}
.howmini .s b{flex:none;width:23px;height:23px;border-radius:50%;background:var(--lime-soft);color:var(--brand);display:grid;place-items:center;font-size:12px;font-weight:800}
.scrolldown{margin-top:22px;font-size:13px;font-weight:800;color:var(--brand);animation:bob 1.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.qh{color:var(--ink);font-family:var(--display);font-size:clamp(22px,3.4vw,30px);letter-spacing:-.005em;margin:8px 0 4px}
.qblock .sec-tag{font-size:11.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--lime);display:flex;align-items:center;gap:7px}
.qblock .sec-tag .dot{width:7px;height:7px;border-radius:50%;background:var(--lime)}
.why-h{font-size:12.5px;font-weight:800;color:var(--brand);display:flex;align-items:center;gap:7px;margin-bottom:5px}
.why.open{background:linear-gradient(180deg,#f6fbfb,#fff);border:1px solid var(--line);border-top:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-top:16px}
.res-block{padding-top:6px}
.res-div{display:flex;align-items:center;gap:12px;margin:2px auto 12px;color:var(--brand);font-weight:800;letter-spacing:.05em;text-transform:uppercase;font-size:12.5px}
.res-div::before,.res-div::after{content:"";flex:1;height:1px;background:var(--line)}
@supports (animation-timeline: view()){
 .qblock.qform{opacity:.001;animation:qin linear both;animation-timeline:view();animation-range:entry 3% entry 52%}
 @keyframes qin{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
 .qh.rv{color:transparent;-webkit-background-clip:text;background-clip:text;background-image:linear-gradient(90deg,var(--brand2),var(--ink) 72%);background-repeat:no-repeat;background-size:0% 100%;animation:qwipe linear both;animation-timeline:view();animation-range:entry 8% cover 44%}

var LEGAL={
 it:"<p><b>Strumento educativo e di supporto alla decisione.</b> Non è un dispositivo medico ai sensi del Reg. (UE) 2017/745 e non fornisce diagnosi né prescrizioni.</p><h4>Uso clinico</h4><p>Le indicazioni derivano da un modello decisionale pubblicato e dalla letteratura scientifica. Non sostituiscono la valutazione del professionista né la visita. Ogni decisione terapeutica, e la relativa responsabilità, resta del clinico sul singolo caso.</p><h4>Privacy e GDPR (Reg. UE 2016/679)</h4><p>Lo strumento non raccoglie né trasmette dati: funziona interamente nel browser, senza server, cookie di profilazione, analytics o tracker di terze parti. L'unico dato salvato in locale è il consenso a questa informativa, per non riproporla. Nome del clinico e del paziente inseriti per il referto sono usati solo in memoria per generare il PDF sul dispositivo, e non vengono memorizzati né inviati. Il paziente è un interessato e il clinico è titolare del trattamento: si raccomanda la minimizzazione, cioè usare iniziali o un codice anziché il nome completo. I collegamenti a DOI e PubMed si aprono solo su clic dell'utente, verso siti esterni con proprie informative.</p><h4>Garanzie</h4><p>Lo strumento è fornito «così com'è», senza garanzie. Gli autori non rispondono di danni derivanti dall'uso. Le presenti note sono informative e non costituiscono consulenza legale.</p>",
 en:"<p><b>Educational, decision-support tool.</b> It is not a medical device under Reg. (EU) 2017/745 and gives no diagnosis or prescription.</p><h4>Clinical use</h4><p>Recommendations come from a published decision model and the literature. They do not replace the clinician's assessment or the visit. Every treatment decision, and its responsibility, stays with the clinician for the individual case.</p><h4>Privacy and GDPR (Reg. EU 2016/679)</h4><p>The tool collects and transmits no data: it runs entirely in the browser, with no server, profiling cookies, analytics or third-party trackers. The only locally stored item is acceptance of this notice, so it is not shown again. Clinician and patient names entered for the report are used only in memory to generate the PDF on the device, and are neither stored nor sent. The patient is a data subject and the clinician is the controller: data minimisation is recommended, that is using initials or a code rather than the full name. DOI and PubMed links open only on user click, to external sites with their own policies.</p><h4>Warranty</h4><p>The tool is provided «as is», without warranty. The authors are not liable for damages arising from its use. These notes are informational and do not constitute legal advice.</p>"

var WHY={
it:{
 ageBand:"<p>L'età fissa l'orizzonte biologico su cui si progetta la riabilitazione. Nel giovane la riabilitazione deve restare stabile per decenni: si privilegiano materiali che resistono all'usura e mantengono la dimensione verticale, cioè le sovrastrutture in zirconia (Thimble, Titanio-Zirconia), che conservano forma e colore nel tempo [papaspyridakos2024]. Resina e composito, al contrario, si abradono sotto i carichi masticatori e negli anni possono ridurre la DVO.</p><p>Nell'anziano il bilancio si sposta: l'aspettativa di vita più breve rende poco vantaggioso un investimento costoso e a lunghissima durata, mentre diventano prioritarie la riparabilità e soprattutto l'igiene, spesso compromessa dalla ridotta destrezza manuale [hamilton2023]. È la ragione per cui, a parità di richiesta estetica, un paziente molto anziano viene indirizzato verso soluzioni più semplici o rimovibili anziché verso la Thimble, il cui vantaggio (riparazione della singola corona) rende meno nel tempo residuo [gelpi2024]. Anche l'aspettativa estetica conta a ogni età: la percezione dell'estetica del sorriso è documentata pure nell'anziano e va indagata caso per caso [sriphadungporn2017].</p>",
 budget:"<p>La disponibilità economica pesa fin dall'inizio: nel modello attiva i ripieghi «troppo costoso». La Tecnica Thimble ha il costo di realizzazione più alto, perché combina una mesostruttura con monconi e corone singole in zirconia; se non sostenibile, si ripiega sul Ponte Titanio-Zirconia e, se ancora eccessivo, su Toronto o Natural bridge [gelpi2024].</p><p>Il costo va letto sull'intero ciclo di vita più che sulla spesa iniziale. La spesa maggiore della Thimble compra riparazioni per singola unità: una corona scheggiata si ricementa senza rifare l'intera protesi. Anche il metallo incide: il cromo-cobalto è di norma più economico e più efficiente in spazio del titanio fresato, pur restando affidabile [delucchi2021]. L'overdenture su barra resta l'opzione fissa-rimovibile più contenuta, utile quando l'economia è il vincolo dominante.</p>",
 reducedHygiene:"<p>La detergibilità è tra i fattori che più incidono sulla salute peri-implantare: contorni protesici poco accessibili e igiene domiciliare inadeguata sono fattori precipitanti di mucosite e perimplantite [hamilton2023]. Quando la destrezza manuale è ridotta (anziano fragile, disabilità, deficit neuromotori), la capacità di detergere l'intradosso di una protesi fissa full-arch crolla.</p><p>In questi casi l'overdenture rimovibile offre il potenziale igienico più alto: il paziente o il caregiver rimuovono il manufatto e puliscono direttamente sia la protesi sia la barra e la mucosa. È un vantaggio che, con il miglior supporto dei tessuti, giustifica la scelta del rimovibile anche quando l'estetica non lo imporrebbe. Nelle soluzioni fisse, un disegno con profili detergibili e intradosso convesso e lucido limita la ritenzione di placca [hamilton2023].</p>",
 parafunction:"<p>Il bruxismo è un fattore di rischio meccanico e biologico. Una revisione sistematica con meta-analisi mostra che i probabili bruxisti hanno un rischio di fallimento implantare significativamente più alto dei non bruxisti (OR ≈ 2,2) [haggman2024]. Il sovraccarico si scarica anche sulla protesi: la complicanza tecnica più frequente delle riabilitazioni full-arch è la frattura o il chipping del rivestimento estetico [wong2018], e la zirconia, per l'elevata durezza, tende a scheggiarsi anziché usurarsi.</p><p>Si aggiunge la ridotta propriocezione peri-implantare rispetto al dente naturale [kazemi2014]: manca il feedback che nel dente limita il carico, quindi il sovraccarico parafunzionale non si autolimita. Le superfici occlusali in resina o composito assorbono l'impatto e proteggono l'interfaccia osso-impianto [menini2013]. Nel bruxista si privilegiano quindi le ibride che ammortizzano il carico, Toronto (resina) e Natural bridge (composito), mentre la zirconia occlusale (Thimble, Titanio-Zirconia, Full Zirconia) viene penalizzata di più; utile una placca notturna.</p>",
 antagonist:"<p>La superficie occlusale va scelta in funzione dell'arcata che la contatta. Contro denti naturali, soprattutto se già indeboliti dal parodonto, la zirconia monolitica, dura e rigida, può accelerarne l'usura; e poiché l'impianto ha propriocezione ridotta [kazemi2014], il carico non viene smorzato come tra denti naturali. Il composito è più protettivo e lavora da ammortizzatore [menini2013].</p><p>Contro un antagonista a sua volta implanto-protesico, o comunque rigido, entrambe le arcate hanno feedback ridotto e le forze salgono: conviene una superficie occlusale resiliente e un'occlusione regolata con cura. Contro una protesi rimovibile o una mucosa, i carichi sono più bassi e il vincolo si allenta. In sintesi: più l'antagonista è naturale e vulnerabile, più si preferisce il composito e si evita la zirconia occlusale [wong2018].</p>",
 esthetic:"<p>Con richiesta estetica alta la zirconia offre traslucenza e stabilità cromatica superiori e, nelle riabilitazioni full-arch monolitiche, mostra sopravvivenze molto elevate [bidra2017][papaspyridakos2024]. La ceramica stratificata dà il risultato più naturale ma è più soggetta a chipping [wong2018]; la zirconia monolitica cede qualcosa in estetica per guadagnare in resistenza.</p><p>Per richieste intermedie, i denti in composito personalizzato (Natural bridge) sono un buon compromesso: si caratterizzano e si riparano facilmente, ma nel tempo si abradono e possono discromizzarsi. I denti del commercio (Toronto) sono l'opzione più economica e meno personalizzabile. La percezione dell'estetica del sorriso, però, è soggettiva e varia con l'età di chi osserva [sriphadungporn2017]: la scelta va condivisa con il paziente e incrociata con parafunzioni, antagonista e linea del sorriso.</p>",
 smile:"<p>La linea del sorriso stabilisce quanto si vede della giunzione tra protesi e mucosa e dell'eventuale gengiva finta. Con un sorriso alto o gengivale la transizione resta esposta: una giunzione resina-metallo poco curata, tipica del Toronto classico, può risultare antiestetica, e serve una gestione accurata dell'emergenza e del rosa. L'esposizione gengivale pesa sulla percezione estetica, che varia anche con l'età dell'osservatore [sriphadungporn2017].</p><p>Con un sorriso basso la transizione è nascosta dal labbro: la libertà di disegno aumenta e il Toronto è ben tollerato. La linea del sorriso si valuta sempre insieme alla necessità di compensare i tessuti molli, perché è la combinazione dei due a decidere se e quanto rosa mostrare e con quale materiale realizzarlo [gelpi2024].</p>",
 needSoftComp:"<p>Dopo il riassorbimento, se i colletti dei denti protesici cadono lontani dalla cresta (indicativamente oltre il 25% della lunghezza del dente, o con sondaggi profondi nelle dentature terminali), occorre gengiva finta per ripristinare supporto del labbro, fonetica ed emergenza corretta [gelpi2024].</p><p>I disegni con flangia (Toronto, Natural bridge e soprattutto l'overdenture) integrano bene il rosa e offrono il miglior supporto dei tessuti; le soluzioni puramente dento-portate come Thimble e Titanio-Zirconia gestiscono meno bene grandi volumi di gengiva. Attenzione a non sovra-contornare per riempire lo spazio: profili troppo pieni ostacolano la detersione e favoriscono la malattia peri-implantare [hamilton2023].</p>",
 arch:"<p>Mascella e mandibola pongono problemi diversi. Il mascellare è più esposto esteticamente e ha di solito osso più tenero: il carico immediato dipende dalla stabilità primaria, dallo splintaggio rigido e dall'uso di impianti tilted, che accorciano i cantilever e distribuiscono meglio lo stress [menini2012][bevilacqua2011]. Uno studio prospettico a 6 anni conferma esiti sovrapponibili tra carico immediato e differito nel mascellare edentulo [tealdo2014].</p><p>La mandibola, più densa, è dominata dalla funzione. Nelle atrofie mascellari gravi, impianti tilted o zigomatici permettono la riabilitazione fissa evitando le rigenerazioni [pesce2023]. L'arcata da trattare orienta quindi sia la strategia chirurgica sia, indirettamente, la scelta protesica e del materiale.</p>",
 space:"<p>Lo spazio protesico verticale, cioè dalla cresta al piano occlusale meno lo spazio libero, decide quali disegni sono realizzabili ed evita chipping e fratture da spessori insufficienti. Esiste una gerarchia di spazio minimo: circa 15 mm per l'ibrida avvitata, 11 mm per l'overdenture su barra, 7-8 mm per le soluzioni cementate e 7 mm per l'overdenture [carpentieri2019]. La zirconia monolitica richiede spessori e aree di connessione adeguati per resistere alla frattura [papaspyridakos2024].</p><p>Quando lo spazio è ridotto, il cromo-cobalto è più efficiente del titanio a parità di rigidità [delucchi2021] e consente strutture più sottili; le opzioni più esigenti in altezza (Titanio-Zirconia e overdenture su barra) diventano poco praticabili. Per questo lo spazio va misurato prima di impostare il caso [carpentieri2019].</p>",
 implants:"<p>Numero e distribuzione degli impianti governano cantilever, ripartizione del carico e scelta del materiale. Una revisione sistematica con meta-analisi non ha trovato differenze significative di sopravvivenza tra meno di cinque e cinque o più impianti per arcata a supporto di protesi fisse complete [daudtpolido2018]. A fare la differenza è la loro posizione, più del numero.</p><p>Più impianti, ben distribuiti, accorciano i cantilever e riducono lo stress su impianti e struttura [bevilacqua2011]. Con pochi impianti (per esempio quattro, tipo All-on-4) cresce la richiesta di adattamento passivo: su una struttura splintata il minimo disadattamento non si «avvita via» e diventa causa di complicanze, perciò i disegni in zirconia monolitica, meno tolleranti al misfit, vengono penalizzati mentre l'ibrida metallo-resina resta più indulgente. Il dato va integrato con il cantilever previsto e con il materiale.</p>",
 longCantilever:"<p>Un cantilever distale esteso funziona da braccio di leva e amplifica lo stress sugli impianti terminali, sulla struttura e sulle viti. L'analisi agli elementi finiti mostra che inclinare gli impianti distali per accorciare il cantilever riduce nettamente lo stress sull'osso peri-implantare, fino a oltre il 70% nelle configurazioni più inclinate [bevilacqua2011].</p><p>Gli impianti tilted sono un modo predicibile per accorciare i cantilever ed evitare le rigenerazioni, con sopravvivenza e perdita ossea marginale sovrapponibili agli assiali [menini2012]. Una regola pratica limita il cantilever a circa 1,5 volte lo spread antero-posteriore, da ridurre ancora con le parafunzioni. Con cantilever lunghi si preferisce una struttura metallica rigida (cromo-cobalto piu del titanio) e si penalizzano i disegni in zirconia monolitica, sia il Ponte Titanio-Zirconia sia la Full Zirconia, perche la zirconia e fragile alla leva e al minimo disadattamento e richiede rapporti di cantilever e connessioni rigorosi per non fratturarsi [papaspyridakos2024].</p>",
 apSpread:"<p>Lo spread antero-posteriore è la distanza fra gli impianti più anteriori e i più distali: più è ampio, più la protesi resiste alla leva dei cantilever. Una regola classica limita il cantilever a circa 1,5 volte lo spread A-P, da ridurre con le parafunzioni [bevilacqua2011]. Gli impianti tilted servono proprio ad allargare lo spread e accorciare i cantilever [menini2012].</p><p>Con spread ridotto (impianti ravvicinati, per esempio quattro molto vicini) la leva sui terminali aumenta e i disegni rigidi e monolitici, meno tolleranti al sovraccarico e al disadattamento, vengono penalizzati; si preferiscono strutture metalliche e, quando indicato, soluzioni che ammortizzano o distribuiscono il carico.</p>",boneQuality:"<p>La qualità ossea governa la stabilità primaria e la quota di stress trasmessa all'interfaccia. Il mascellare posteriore ha spesso osso tenero (tipo III-IV), dove il carico immediato dipende da stabilità primaria, splintaggio rigido e impianti tilted che accorciano i cantilever [menini2012][tealdo2014].</p><p>Su osso tenero conviene attenuare i picchi di carico: le superfici occlusali in resina o composito ammortizzano [menini2013] e le soluzioni che distribuiscono il carico sono più prudenti, mentre la zirconia monolitica, rigida e fragile al disadattamento, viene penalizzata. Su osso denso il vincolo si allenta e la scelta torna guidata da estetica, spazio e materiale.</p>",
 systemicRisk:"<p>Un rischio sistemico o biologico rilevante (diabete scompensato, immunodepressione, terapie antiriassorbitive con rischio di MRONJ, tabagismo importante) aumenta le complicanze biologiche e sposta le priorità verso disegni mantenibili, ritrattabili e facili da detergere [hamilton2023].</p><p>Le protesi avvitate sono ritrattabili e permettono ispezione e re-intervento; dove l'igiene è a rischio, l'overdenture rimovibile agevola la manutenzione. Il carico immediato resta possibile in casi selezionati, ma richiede una selezione più severa e un follow-up ravvicinato [gallardo2019]. L'ibrida metallo-resina, riparabile alla poltrona, semplifica la gestione delle complicanze, mentre i disegni monolitici complessi si prestano meno. In questi pazienti la scelta protesica privilegia la gestibilità nel tempo rispetto alla massima complessità.</p>",
 acceptOVD:"<p>L'accettazione di un manufatto rimovibile è il presupposto dell'overdenture su barra: se il paziente desidera una soluzione fissa, quel ramo decade a prescindere dai suoi vantaggi igienici. È una decisione clinica da condividere con il paziente.</p><p>All'overdenture va spiegata la manutenzione (usura degli attacchi, ribasature periodiche), a fronte però di una detergibilità superiore e di un ottimo supporto di labbro e tessuti, particolarmente utile nelle forti atrofie [hamilton2023][carpentieri2019]. Chi rifiuta il rimovibile va indirizzato verso le soluzioni fisse, accettandone i compromessi di igiene e ingombro.</p>",
 willingInvest:"<p>Questa domanda cattura la logica della Tecnica Thimble: un investimento iniziale maggiore compra corone singole in zirconia cementate su una mesostruttura, così la singola unità scheggiata o usurata si sostituisce a basso costo senza rifare l'intera protesi. In un paziente giovane e con mezzi, questo migliora il costo sull'intero ciclo di vita e la stabilità della DVO [papaspyridakos2024].</p><p>Se il paziente non è disposto all'esborso iniziale, si scelgono soluzioni meno costose (Toronto, Natural) o il Titanio-Zirconia, che offre estetica e stabilità con una riparabilità intermedia [gelpi2024]. In modalità «Automatico» il dato è dedotto dal budget dichiarato.</p>",
 investPractical:"<p>Qui si bilancia l'investimento con l'aspettativa di vita e l'orizzonte biologico. Un disegno costoso e ultra-durevole come la Thimble rende sempre meno all'aumentare dell'età, dove contano di più riparabilità, igiene e contenimento della spesa: è la ragione per cui, nella casistica, una paziente di 75 anni è stata spostata dalla Thimble al Titanio-Zirconia [gelpi2024].</p><p>Nel giovane, al contrario, l'orizzonte lungo giustifica l'investimento in un materiale che conserva la DVO per anni [papaspyridakos2024]. La valutazione resta interpretativa e va calata sul singolo paziente; in modalità «Automatico» viene dedotta da età e budget.</p>"
},
en:{
 ageBand:"<p>Age sets the biological horizon you design for. In young patients the rehabilitation must stay stable for decades: wear-resistant materials that hold the vertical dimension are preferred, that is zirconia superstructures (Thimble, Titanium-Zirconia), which keep shape and colour over time [papaspyridakos2024]. Resin and composite abrade under masticatory load and, over years, can lower the OVD.</p><p>In the elderly the balance shifts: a shorter life expectancy makes an expensive, ultra-durable investment less worthwhile, while repairability and above all hygiene, often limited by reduced manual dexterity, become the priority [hamilton2023]. That is why, for the same esthetic demand, a very old patient is steered toward simpler or removable solutions rather than the Thimble, whose single-crown-repair advantage pays off less over the remaining years [gelpi2024]. Esthetic expectations matter at any age: perception of smile esthetics is documented in older patients too and should be explored case by case [sriphadungporn2017].</p>",
 budget:"<p>Economic resources weigh from the outset: in the model they trigger the 'too expensive' fallbacks. The Thimble technique has the highest fabrication cost, because it combines a stump mesostructure with individual zirconia crowns; if unaffordable it steps down to the Titanium-Zirconia bridge and, if still too much, to the Toronto or Natural bridge [gelpi2024].</p><p>Cost should be read over the whole life cycle rather than at delivery alone. The Thimble's higher price buys per-unit repairs: a chipped crown is re-cemented without remaking the whole prosthesis. Metal choice matters too: cobalt-chromium is usually cheaper and more space-efficient than milled titanium while remaining reliable [delucchi2021]. The bar overdenture stays the most affordable fixed-removable option when cost is the dominant constraint.</p>",
 reducedHygiene:"<p>Cleansability is among the factors that most affect peri-implant health: poorly accessible restorative contours and inadequate home care are precipitating factors for mucositis and peri-implantitis [hamilton2023]. When manual dexterity is reduced (frail elderly, disability, neuromotor deficits), the ability to clean the intaglio of a fixed full-arch prosthesis drops sharply.</p><p>Here the removable overdenture offers the highest hygienic potential: the patient or caregiver removes the device and cleans the prosthesis, the bar and the mucosa directly. This advantage, with better tissue support, can justify a removable even when esthetics would not demand it. In fixed designs, cleansable profiles and a convex, polished intaglio limit plaque retention [hamilton2023].</p>",
 parafunction:"<p>Bruxism is a mechanical and biological risk factor. A systematic review with meta-analysis shows that probable bruxers carry a significantly higher risk of implant failure than non-bruxers (OR ≈ 2.2) [haggman2024]. Overload also hits the prosthesis: the most frequent technical complication of full-arch rehabilitations is veneer fracture or chipping [wong2018], and zirconia, being very hard, tends to chip rather than wear.</p><p>Add the reduced peri-implant proprioception compared with a natural tooth [kazemi2014]: the feedback that limits load on a tooth is missing, so parafunctional overload is not self-limiting. Resin or composite occlusal surfaces absorb impact and protect the bone-implant interface [menini2013]. In bruxers, therefore, the cushioning hybrids are preferred, Toronto (acrylic) and Natural bridge (composite), while occlusal zirconia (Thimble, Titanium-Zirconia, Full Zirconia) is penalised more, and a night guard is considered.</p>",
 antagonist:"<p>The occlusal surface should match the arch it meets. Against natural teeth, especially if periodontally weakened, hard, rigid monolithic zirconia can accelerate their wear; and because the implant has reduced proprioception [kazemi2014], the load is not damped as it is between natural teeth. Composite is more protective and acts as a shock absorber [menini2013].</p><p>Against an antagonist that is itself implant-borne, or otherwise rigid, both arches have reduced feedback and forces rise: a resilient occlusal surface and carefully adjusted occlusion are preferable. Against a removable prosthesis or mucosa, loads are lower and the constraint relaxes. In short: the more natural and vulnerable the antagonist, the more composite is preferred and occlusal zirconia avoided [wong2018].</p>",
 esthetic:"<p>When esthetic demand is high, zirconia offers superior translucency and colour stability and, in monolithic full-arch rehabilitations, shows very high survival [bidra2017][papaspyridakos2024]. Layered ceramic gives the most natural result but chips more [wong2018]; monolithic zirconia trades some esthetics for strength.</p><p>For moderate demands, customized composite teeth (Natural bridge) are a good compromise: easy to characterise and repair, but they abrade and may discolour over time. Denture teeth (Toronto) are the most economical and least customizable. Perception of smile esthetics, though, is subjective and varies with the observer's age [sriphadungporn2017]: the choice should be shared with the patient and crossed with parafunction, antagonist and smile line.</p>",
 smile:"<p>The smile line sets how much of the prosthesis-mucosa junction and of any false gingiva is visible. With a high or gummy smile the transition stays exposed: a poorly finished resin-metal junction, typical of the classic Toronto, can look unesthetic, and careful management of emergence and pink is needed. Gingival display weighs on esthetic perception, which also varies with the observer's age [sriphadungporn2017].</p><p>With a low smile line the lip hides the transition: design freedom increases and the Toronto is well tolerated. The smile line is always assessed together with the need for soft-tissue compensation, because it is their combination that decides whether and how much pink to show, and in which material [gelpi2024].</p>",
 needSoftComp:"<p>After resorption, if the cervical margins of the prosthetic teeth fall far from the ridge (roughly beyond 25% of tooth length, or with deep probing in failing dentitions), false gingiva is needed to restore lip support, phonetics and correct emergence [gelpi2024].</p><p>Flange designs (Toronto, Natural bridge and above all the overdenture) integrate pink well and give the best tissue support; purely tooth-borne solutions such as Thimble and Titanium-Zirconia handle large gingival volumes less well. Take care not to over-contour to fill space: over-full profiles hinder cleaning and favour peri-implant disease [hamilton2023].</p>",
 arch:"<p>Maxilla and mandible pose different problems. The maxilla is more esthetically exposed and usually has softer bone: immediate loading depends on primary stability, rigid splinting and tilted implants, which shorten cantilevers and spread stress [menini2012][bevilacqua2011]. A 6-year prospective study confirms comparable outcomes for immediate and delayed loading in the edentulous maxilla [tealdo2014].</p><p>The mandible, denser, is function-driven. In severe maxillary atrophy, tilted or zygomatic implants allow fixed rehabilitation while avoiding grafting [pesce2023]. The arch to treat therefore guides both the surgical strategy and, indirectly, the prosthetic and material choice.</p>",
 space:"<p>Vertical prosthetic space, that is from the ridge to the occlusal plane minus the freeway space, decides which designs are feasible and prevents chipping and fracture from thin sections. There is a minimum-space hierarchy: about 15 mm for the screw-retained hybrid, 11 mm for the bar overdenture, 7-8 mm for cemented solutions and 7 mm for the overdenture [carpentieri2019]. Monolithic zirconia needs adequate thickness and connector area to resist fracture [papaspyridakos2024].</p><p>When space is reduced, cobalt-chromium is more efficient than titanium for the same rigidity [delucchi2021] and allows thinner structures; the most height-hungry options (Titanium-Zirconia and bar overdenture) become impractical. So the space should be measured before planning the case [carpentieri2019].</p>",
 implants:"<p>Implant number and distribution govern cantilever, load sharing and material choice. A systematic review with meta-analysis found no significant survival difference between fewer than five and five or more implants per arch supporting complete fixed prostheses [daudtpolido2018]. What matters is their position, more than the number.</p><p>More, well-distributed implants shorten cantilevers and reduce stress on implants and framework [bevilacqua2011]. With few implants (for example four, All-on-4) the demand for passive fit rises: on a splinted framework the slightest misfit cannot be screwed away and becomes a source of complications, so monolithic-zirconia designs, less tolerant of misfit, are penalised while the metal-acrylic hybrid stays more forgiving. Read the figure together with the planned cantilever and material.</p>",
 longCantilever:"<p>An extended distal cantilever acts as a lever arm and amplifies stress on the terminal implants, the framework and the screws. Finite-element analysis shows that tilting the distal implants to shorten the cantilever markedly reduces peri-implant bone stress, by over 70% in the most inclined configurations [bevilacqua2011].</p><p>Tilted implants are a predictable way to shorten cantilevers and avoid grafting, with survival and marginal bone loss comparable to axial implants [menini2012]. A practical rule keeps the cantilever to about 1.5 times the anteroposterior spread, and shorter still with parafunction. With long cantilevers a rigid metal framework is preferred (cobalt-chromium over titanium), and monolithic-zirconia designs, both the Titanium-Zirconia bridge and Full Zirconia, are penalised, since zirconia is brittle under leverage and the slightest misfit and needs strict cantilever and connector ratios to resist fracture [papaspyridakos2024].</p>",
 apSpread:"<p>The anteroposterior spread is the distance between the most anterior and the most distal implants: the wider it is, the better the prosthesis resists cantilever leverage. A classic rule keeps the cantilever to about 1.5 times the A-P spread, less with parafunction [bevilacqua2011]. Tilted implants are used precisely to widen the spread and shorten the cantilevers [menini2012].</p><p>With a reduced spread (implants close together, for example four bunched implants) leverage on the terminals rises and rigid, monolithic designs, less tolerant of overload and misfit, are penalised; metal frameworks are preferred and, where indicated, solutions that cushion or distribute the load.</p>",boneQuality:"<p>Bone quality governs primary stability and the share of stress transmitted to the interface. The posterior maxilla is often soft bone (type III-IV), where immediate loading depends on primary stability, rigid splinting and tilted implants that shorten cantilevers [menini2012][tealdo2014].</p><p>On soft bone it is wise to blunt load peaks: resin or composite occlusal surfaces cushion [menini2013] and load-distributing solutions are more prudent, while monolithic zirconia, rigid and misfit-sensitive, is penalised. On dense bone the constraint relaxes and the choice is again driven by esthetics, space and material.</p>",
 systemicRisk:"<p>A relevant systemic or biological risk (uncontrolled diabetes, immunosuppression, antiresorptive therapy with MRONJ risk, heavy smoking) raises biological complications and shifts priorities toward maintainable, retrievable, easily cleaned designs [hamilton2023].</p><p>Screw-retained prostheses are retrievable and allow inspection and re-intervention; where hygiene is at risk, the removable overdenture eases maintenance. Immediate loading remains possible in selected cases but demands stricter selection and closer follow-up [gallardo2019]. The metal-acrylic hybrid, repairable chairside, simplifies the management of complications, while complex monolithic designs are less suited. In these patients the prosthetic choice favours long-term manageability over maximum complexity.</p>",
 acceptOVD:"<p>Acceptance of a removable device is the prerequisite for the bar overdenture: if the patient wants a fixed solution, that branch is dropped regardless of its hygienic advantages. It is a clinical decision to share with the patient.</p><p>The overdenture requires explaining maintenance (attachment wear, periodic relines), but offers superior cleansability and excellent lip and tissue support, particularly useful in severe atrophy [hamilton2023][carpentieri2019]. A patient who refuses a removable is directed toward fixed solutions, accepting their hygiene and bulk trade-offs.</p>",
 willingInvest:"<p>This question captures the Thimble rationale: a higher upfront investment buys individual zirconia crowns luted onto a mesostructure, so a single chipped or worn unit is replaced cheaply without remaking the whole prosthesis. In a young patient with means, this improves whole-life cost and OVD stability [papaspyridakos2024].</p><p>If the patient is not willing to spend more upfront, cheaper solutions (Toronto, Natural) or the Titanium-Zirconia bridge are chosen, the latter offering esthetics and stability with intermediate repairability [gelpi2024]. In 'Automatic' mode the value is inferred from the stated budget.</p>",
 investPractical:"<p>Here the investment is balanced against life expectancy and biological horizon. A costly, ultra-durable design such as the Thimble yields diminishing returns as age rises, where repairability, hygiene and cost control dominate: that is why, in the case series, a 75-year-old was moved from the Thimble to the Titanium-Zirconia bridge [gelpi2024].</p><p>In a young patient, by contrast, the long horizon justifies investing in a material that holds the OVD for years [papaspyridakos2024]. The judgement stays interpretive and must fit the individual; in 'Automatic' mode it is inferred from age and budget.</p>"
}
};

function renderInfo(){

 var scoring=it?'<p>Lo strumento si basa sulla <b>classificazione delle protesi full-arch avvitate su impianti</b> proposta da Gelpi e colleghi (Eur J Musculoskelet Dis, 2024), che descrive sei soluzioni protesiche e un albero decisionale per orientarne la scelta.</p><p>Lavorano insieme due motori. Il <b>flowchart deterministico</b> riproduce quell\'albero decisionale e indica l\'opzione «di percorso». Il <b>punteggio pesato</b>, sviluppato a partire dalla stessa classificazione, confronta tutte e sei le soluzioni.</p><p>Ogni opzione parte da un punteggio base e viene spostata da <b>modificatori</b>, uno per parametro. I pesi seguono le stesse evidenze citate nei «Perché conta»: il bruxismo penalizza la zirconia occlusale e premia resina e composito; lo spazio ridotto penalizza Titanio-Zirconia e overdenture; il budget ridotto premia le soluzioni economiche; l\'età giovane premia i materiali che conservano la dimensione verticale. Il punteggio finale è la somma di base e modificatori attivi, su scala 0-100, e le opzioni sono ordinate in modo decrescente.</p><p>Quando flowchart e punteggio divergono di poco, sono opzioni contigue: la classificazione è interpretativa, non prescrittiva. Il modello riproduce i cinque casi clinici descritti nella pubblicazione ed è stato controllato per coerenza interna, monotonìa dei parametri e assenza di controindicazioni.</p><p>Il <b>materiale del framework</b> (titanio o cromo-cobalto) segue il confronto fra i due metalli riportato nella stessa classificazione: il titanio è il materiale di scelta per biocompatibilità e affidabilità, mentre il cromo-cobalto conviene con spazio protesico ridotto o cantilever estesi, perché consente sezioni più sottili (0,5/2,5 mm contro 0,8/4 mm). Nel Ponte Titanio-Zirconia e nell\'overdenture il framework è in titanio per disegno; il Full Zirconia non ha struttura metallica. Nel modello agisce come moltiplicatore sul punteggio di ciascuna opzione, non come voce a sé.</p>':'<p>The tool builds on the <b>classification of full-arch screw-retained implant prostheses</b> proposed by Gelpi and colleagues (Eur J Musculoskelet Dis, 2024), which describes six prosthetic solutions and a decision tree to guide the choice.</p><p>Two engines work together. The <b>deterministic flowchart</b> reproduces that decision tree and gives the «path» option. The <b>weighted score</b>, developed from the same classification, compares all six solutions.</p><p>Each option starts from a base score and is shifted by <b>modifiers</b>, one per parameter. The weights follow the same evidence cited in the «Why it matters» notes: bruxism penalises occlusal zirconia and rewards resin and composite; reduced space penalises Titanium-Zirconia and overdenture; a reduced budget rewards economical solutions; young age rewards materials that preserve the vertical dimension. The final score is the sum of base and active modifiers on a 0-100 scale, and options are ranked in descending order.</p><p>When flowchart and score diverge slightly, the options are adjacent: the classification is interpretive, not prescriptive. The model reproduces the five clinical cases described in the publication and was checked for internal consistency, parameter monotonicity and absence of contraindications.</p><p>The <b>framework material</b> (titanium or cobalt-chromium) follows the comparison between the two metals reported in the same classification: titanium is the material of choice for biocompatibility and reliability, while cobalt-chromium is preferable with reduced prosthetic space or long cantilevers, since it allows thinner sections (0.5/2.5 mm versus 0.8/4 mm). In the Titanium-Zirconia bridge and the overdenture the framework is titanium by design; Full Zirconia has no metal structure. In the model it acts as a multiplier on the score of each option, not as a standalone item.</p>';
